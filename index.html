<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer src="game.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="panel stats">
            <div class="panel-title">STATS</div>
            <div class="player1">
                <div>Player 1</div>
                
                <div><span class="p1-wins">0</span></div>
            </div>
            <!-- <div>
                Current Turn
                "✖":"◯"
            </div> -->
            <div class="player2">
                <div>Player 2</div>
                
                <div><span class="p2-wins">0</span></div>
            </div>
        </div>
        <div class="panel gato">
            <div class="panel-title">Game</div>
            <div class="element" data-pos="1,1"></div>
            <div class="element" data-pos="2,1"></div>
            <div class="element" data-pos="3,1"></div>

            <div class="element" data-pos="1,2"></div>
            <div class="element" data-pos="2,2"></div>
            <div class="element" data-pos="3,2"></div>
            
            <div class="element" data-pos="1,3"></div>
            <div class="element" data-pos="2,3"></div>
            <div class="element" data-pos="3,3"></div>
        </div>

        <div class="panel menu">
            <button id="ngame">New game</button>
            <button id="reMatch">Rematch</button>
            <button id="quit">Quit</button>
        </div>
    </div>
    
    <dialog id="myModal">
        <h2>Game Over</h2>
        <p>Final Result</p>
        <p>Player 1: <span class="p1-wins">0</span></p>
        <p>Player 2: <span class="p2-wins">0</span></p>
        <form method="dialog">
            <button id="closeModalBtn" value="default">Close</button>
        </form>
    </dialog>
</body>
</html>
