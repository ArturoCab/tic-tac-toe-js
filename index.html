<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer src="game.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="panel stats">
            <div class="panel-title">STATS</div>
            <div class="player1">
                <div>Player 1</div>
                <div>palo</div>
                <div>#wins</div>
            </div>
            <div>
                Current Turn
                "✖":"◯"
            </div>
            <div class="player2">
                <div>Player 1</div>
                <div>palo</div>
                <div>#wins</div>
            </div>
        </div>
        <div class="panel gato">
            <div class="panel-title">Game</div>
            <div class="element" data-pos="1,1"></div>
            <div class="element" data-pos="2,1"></div>
            <div class="element" data-pos="3,1"></div>

            <div class="element" data-pos="1,2"></div>
            <div class="element" data-pos="2,2"></div>
            <div class="element" data-pos="3,2"></div>
            
            <div class="element" data-pos="1,3"></div>
            <div class="element" data-pos="2,3"></div>
            <div class="element" data-pos="3,3"></div>
        </div>

        <div class="panel menu">
            <button>New game</button>
            <button>Rematch</button>
            <button>Quit</button>
        </div>
    </div>
</body>
</html>
